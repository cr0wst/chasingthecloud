services:
  traefik:
    image: "traefik:v3.2"
    command:
      - "--log.level=DEBUG"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      #- "--certificatesresolvers.myresolver.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.myresolver.acme.email=steve@smcrow.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "8080:8080"
      - "443:443"
    networks:
      - web
    volumes:
      - "letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
  swarmpit:
    image: swarmpit/install:edge
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    environment:
      - INTERACTIVE: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.swarmpit.rule=Host(`dashboard.chasingthe.cloud`)"
      - "traefik.http.routers.swarmpit.entrypoints=websecure"
      - "traefik.http.routers.swarmpit.tls.certresolver=myresolver"
      - "traefik.http.routers.swarmpit.service=swarmpit"
      - "traefik.http.services.swarmpit.loadbalancer.server.port=80"
volumes:
  letsencrypt:

networks:
  web:
    external: true
